name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # --- الحل النهائي لمشكلة Gradle Wrapper ---
    - name: Download and fix Gradle Wrapper
      run: |
        # 1. حذف الملف التالف
        rm -f gradle/wrapper/gradle-wrapper.jar
        
        # 2. تحميل Gradle 8.0.2 (نسخة مستقرة ومتوافقة)
        wget -q https://services.gradle.org/distributions/gradle-8.0.2-bin.zip
        unzip -q gradle-8.0.2-bin.zip
        
        # 3. استخدام الإصدار الذي تم تنزيله لإنشاء Wrapper صحيح
        gradle-8.0.2/bin/gradle wrapper
        
        # 4. تنظيف الملفات الزائدة
        rm -rf gradle-8.0.2 gradle-8.0.2-bin.zip
    # -----------------------------------------

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Real Projects Secrets
      env:
        MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      run: |
        # تجاوز عدم وجود مفتاح الخريطة
        if [ -z "$MAPS_API_KEY" ]; then
          echo "MAPS_API_KEY=dummy_key_for_build_only" > local.properties
        else
          echo "MAPS_API_KEY=$MAPS_API_KEY" > local.properties
        fi

        # تجاوز عدم وجود ملف google-services.json
        if [ -z "$GOOGLE_SERVICES_JSON" ]; then
          echo "{}" > app/google-services.json
        else
          echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
        fi
      
    - name: Build APK
      run: ./gradlew assembleDebug --stacktrace
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
