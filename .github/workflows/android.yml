name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # --- الحل النهائي ---
    - name: Fix Gradle Wrapper
      run: |
        # 1. حذف الملف التالف إذا وجد
        rm -f gradle/wrapper/gradle-wrapper.jar
        
        # 2. تنزيل gradle-wrapper.jar الصحيح (بدون فك ضغط)
        curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar
        
        # 3. منح صلاحية التنفيذ
        chmod +x gradlew
    # -------------------

    - name: Setup Real Projects Secrets
      env:
        MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      run: |
        if [ -z "$MAPS_API_KEY" ]; then
          echo "MAPS_API_KEY=dummy_key_for_build_only" > local.properties
        else
          echo "MAPS_API_KEY=$MAPS_API_KEY" > local.properties
        fi
        if [ -z "$GOOGLE_SERVICES_JSON" ]; then
          echo "{}" > app/google-services.json
        else
          echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
        fi
      
    - name: Build APK
      run: ./gradlew assembleDebug --stacktrace
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
