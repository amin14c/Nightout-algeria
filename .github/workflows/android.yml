name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # --- الحل الأبسط لإنشاء Wrapper ---
    # نقوم بحذف الملف التالف فقط إذا كان موجوداً، ثم نستخدم الأمر wrapper
    - name: Generate Gradle Wrapper
      run: |
        rm -f gradle/wrapper/gradle-wrapper.jar
        ./gradlew wrapper --gradle-version 8.5.0
    # ----------------------------------

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Real Projects Secrets
      env:
        MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      run: |
        if [ -z "$MAPS_API_KEY" ]; then
          echo "MAPS_API_KEY=dummy_key_for_build_only" > local.properties
        else
          echo "MAPS_API_KEY=$MAPS_API_KEY" > local.properties
        fi
        if [ -z "$GOOGLE_SERVICES_JSON" ]; then
          echo "{}" > app/google-services.json
        else
          echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
        fi
      
    - name: Build APK
      run: ./gradlew assembleDebug --stacktrace
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
